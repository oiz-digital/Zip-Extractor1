# ZBX Light Node (Kubernetes)
# Provides a light node endpoint for mobile wallets and browsers.
# Uses ZK state proofs (zbx-prover) instead of downloading full state.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zbx-light
  namespace: zbx-chain
  labels:
    app: zbx-light
    component: light-client
spec:
  replicas: 5     # High availability for wallet connections
  selector:
    matchLabels:
      app: zbx-light
  template:
    metadata:
      labels:
        app: zbx-light
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9094"
    spec:
      containers:
        - name: light
          image: zbvix/zbx-light:0.1.0
          ports:
            - containerPort: 8580   # JSON-RPC (subset: eth_call, eth_getBalance, etc.)
            - containerPort: 8581   # WebSocket
            - containerPort: 9094   # Prometheus metrics
          env:
            - name: ZBX_RPC
              value: "http://zbx-rpc:8545"
            - name: PROVER_ENDPOINT
              value: "http://zbx-prover:8550"
            - name: SYNC_MODE
              value: "light"
            - name: PROOF_CACHE_ENABLED
              value: "true"
            - name: RUST_LOG
              value: "zbx_light=info"
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2"
              memory: "2Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8580
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /ready
              port: 8580
            initialDelaySeconds: 2
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: zbx-light
  namespace: zbx-chain
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
spec:
  type: LoadBalancer
  selector:
    app: zbx-light
  ports:
    - name: rpc
      port: 80
      targetPort: 8580
    - name: ws
      port: 443
      targetPort: 8581