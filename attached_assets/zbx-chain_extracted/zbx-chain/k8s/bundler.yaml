# ZBX ERC-4337 Bundler (Kubernetes)
# Collects UserOperations and submits them to ZbxEntryPoint.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zbx-bundler
  namespace: zbx-chain
  labels:
    app: zbx-bundler
    component: account-abstraction
spec:
  replicas: 3
  selector:
    matchLabels:
      app: zbx-bundler
  template:
    metadata:
      labels:
        app: zbx-bundler
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9095"
    spec:
      containers:
        - name: bundler
          image: zbvix/zbx-bundler:0.1.0
          ports:
            - containerPort: 8590   # ERC-4337 bundler API
            - containerPort: 9095   # Prometheus metrics
          env:
            - name: ENTRY_POINT
              value: "0x0000000000000000000000000000000000000010"
            - name: ZBX_RPC
              value: "http://zbx-rpc:8545"
            - name: BUNDLER_KEY
              valueFrom:
                secretKeyRef:
                  name: zbx-secrets
                  key: bundler-private-key
            - name: MAX_BUNDLE_SIZE
              value: "10"
            - name: MIN_PRIORITY_FEE
              value: "100000000"    # 0.1 gwei
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2"
              memory: "2Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8590
            initialDelaySeconds: 5
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: zbx-bundler
  namespace: zbx-chain
spec:
  selector:
    app: zbx-bundler
  ports:
    - name: api
      port: 8590
      targetPort: 8590