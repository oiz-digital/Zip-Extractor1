global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    chain: zbx-mainnet
    chain_id: "8989"

scrape_configs:
  - job_name: "zbx-node"
    static_configs:
      - targets: ["validator:9100"]
    metrics_path: /metrics
    scrape_interval: 10s

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
