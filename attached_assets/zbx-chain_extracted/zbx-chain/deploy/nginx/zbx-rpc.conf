# ---------- Testnet RPC: https://rpc-testnet.zbx.io -> 127.0.0.1:18545 ----------
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name rpc-testnet.zbx.io;

    ssl_certificate     /etc/letsencrypt/live/zbx.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/zbx.io/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    client_max_body_size 1m;
    limit_req zone=zbx_rpc_burst burst=200 delay=50;
    limit_req_status 429;

    location / {
        proxy_pass         http://127.0.0.1:18545;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           "";
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options    "nosniff" always;
        add_header X-Frame-Options           "DENY" always;
        add_header Referrer-Policy           "no-referrer" always;
    }

    location = /healthz {
        access_log off;
        proxy_pass http://127.0.0.1:18545/healthz;
        add_header X-Content-Type-Options "nosniff" always;
    }
}

# ---------- HTTP -> HTTPS redirect ----------
server {
    listen 80;
    listen [::]:80;
    server_name rpc.zbx.io rpc-testnet.zbx.io;

    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}
