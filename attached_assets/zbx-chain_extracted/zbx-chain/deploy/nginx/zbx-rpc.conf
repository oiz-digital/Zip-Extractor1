# Zebvix Chain — nginx reverse proxy with TLS
# Place at /etc/nginx/sites-available/zbx-rpc.conf and symlink into sites-enabled.
#
# Assumes Let's Encrypt certs at /etc/letsencrypt/live/zbx.io/
# Adjust server_name + cert paths for your domain.

# ---------- Rate limiting (per client IP) ----------
limit_req_zone $binary_remote_addr zone=zbx_rpc:10m rate=20r/s;
limit_req_zone $binary_remote_addr zone=zbx_rpc_burst:10m rate=120r/m;

# ---------- Mainnet RPC: https://rpc.zbx.io -> 127.0.0.1:8545 ----------
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    # http2 is declared separately to avoid H2C upgrade smuggling (CVE-class)
    http2 on;
    server_name rpc.zbx.io;

    ssl_certificate     /etc/letsencrypt/live/zbx.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/zbx.io/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # Body size cap (eth_sendRawTransaction can be ~5KB; 1MB is generous)
    client_max_body_size 1m;
    client_body_timeout  10s;
    client_header_timeout 10s;

    # Rate limit: 20 req/s sustained, burst of 60 with 200ms delay
    limit_req zone=zbx_rpc burst=60 delay=20;
    limit_req_status 429;

    # JSON-RPC HTTP
    location / {
        proxy_pass         http://127.0.0.1:8545;
        proxy_http_version 1.1;
        # Strip hop-by-hop headers to prevent H2C upgrade smuggling
        proxy_set_header   Upgrade           "";
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;

        # Security headers — declared in each location block to avoid
        # add_header inheritance override (nginx resets inherited headers
        # when any add_header appears in a child block).
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options    "nosniff" always;
        add_header X-Frame-Options           "DENY" always;
        add_header Referrer-Policy           "no-referrer" always;

        # CORS handled by zbx-rpc itself; do not double-set here.
    }

    # Health check (unrestricted, no rate limit)
    location = /healthz {
        access_log off;
        proxy_pass http://127.0.0.1:8545/healthz;
        add_header X-Content-Type-Options "nosniff" always;
    }
}

# ---------- Mainnet WS (wss://ws.zbx.io) ----------
# WebSocket JSON-RPC is not yet implemented in zbx-rpc (planned for v0.3).
# When the in-process WS listener ships, uncomment the block below and point
