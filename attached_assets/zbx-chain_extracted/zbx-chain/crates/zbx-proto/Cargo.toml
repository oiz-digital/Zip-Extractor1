[package]
name    = "zbx-proto"
version = "0.1.0"
edition = "2021"

[dependencies]
prost       = "0.13"
tonic       = { version = "0.12", features = ["transport"] }
tokio       = { version = "1", features = ["macros", "rt-multi-thread"] }

[build-dependencies]
tonic-build = "0.12"

[lib]
name = "zbx_proto"
path = "src/lib.rs"
