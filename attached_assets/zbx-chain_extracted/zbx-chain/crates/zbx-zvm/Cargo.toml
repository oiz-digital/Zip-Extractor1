[package]
name = "zbx-zvm"
version = "0.1.0"
edition = "2021"
description = "ZVM — Zebvix Virtual Machine (EVM-compatible + ZBX native opcodes)"

[dependencies]
zbx-types    = { path = "../zbx-types" }
zbx-crypto   = { path = "../zbx-crypto" }
zbx-metrics  = { path = "../zbx-metrics" }
zbx-evm      = { path = "../zbx-evm" }
serde        = { version = "1", features = ["derive"] }
serde_json   = "1"
thiserror    = "1"
tracing      = "0.1"
sha2         = "0.10"
sha3         = "0.10"
hex          = "0.4"
primitive-types = "0.12"
# SEC-2026-05-09 Pass-18 — real precompiles 0x03 / 0x05 / 0x06 / 0x07 / 0x08 / 0x09 / 0x0D
# (RIPEMD-160, MODEXP, BN128 add/mul/pairing, BLAKE2F, Ed25519). Same versions
# as zbx-evm precompiles to keep one source of truth across the workspace.
ripemd        = "0.1"
num-bigint    = "0.4"
num-traits    = "0.2"
substrate-bn  = "0.6"
ed25519-dalek = "2"

[dev-dependencies]
# Task #4 (KZG 0x0B precompile tests)
bls12_381 = { version = "0.8", features = ["experimental", "pairings"] }
ff        = "0.13"
group     = "0.13"
rand      = "0.8"
