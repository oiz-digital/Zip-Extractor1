[package]
name = "zbx-types"
version = "0.2.0"
edition = "2021"
authors = ["Zebvix Technologies Pvt Ltd"]
description = "Core primitive types for the Zebvix blockchain"
license = "MIT"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde-big-array = "0.5"
serde_json = "1"
hex = "0.4"
thiserror = "1"
bytes = "1"
rlp = "0.5"
sha3 = "0.10"
primitive-types = { version = "0.12", features = ["serde"] }
bincode = "1"