[package]
name    = "zbx-prover"
version = "0.2.0"
edition = "2021"
description = "ZK proof system for Zebvix Chain — state proofs, fraud proofs, recursive aggregation"

[dependencies]
zbx-types   = { path = "../zbx-types" }
zbx-crypto  = { path = "../zbx-crypto" }
zbx-trie    = { path = "../zbx-trie" }
zbx-storage = { path = "../zbx-storage" }
zbx-evm     = { path = "../zbx-evm" }

thiserror   = "1"
serde       = { version = "1", features = ["derive"] }
serde_json  = "1"
hex         = "0.4"
rayon       = { version = "1", optional = true }   # parallel proof generation
sha3        = "0.10"     # Keccak-256 for Fiat-Shamir
ark-ff      = "0.4"      # finite field arithmetic (BN254 scalar field)
ark-poly    = "0.4"      # polynomial operations
ark-std     = "0.4"

[features]
# Enable GPU-accelerated proof generation (requires CUDA/ROCm).
gpu = []
# Enable recursive proof aggregation (slower compile, faster proving).
recursive = []
# Enable parallel witness generation.
parallel = ["rayon"]

[profile.release]
opt-level = 3
lto       = "fat"
codegen-units = 1   # maximise optimisation for proof generation