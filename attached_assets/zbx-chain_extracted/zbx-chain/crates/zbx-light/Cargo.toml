[package]
name    = "zbx-light"
version = "0.1.0"
edition = "2021"
authors = ["Zebvix Technologies <dev@zebvix.com>"]
description = "Light client for Zebvix Chain: headers + SPV proofs"
license     = "Apache-2.0"

[dependencies]
zbx-types  = { path = "../zbx-types" }
zbx-crypto = { path = "../zbx-crypto" }
zbx-rlp    = { path = "../zbx-rlp" }
zbx-trie   = { path = "../zbx-trie" }
thiserror  = "1"
tracing    = "0.1"
serde      = { version = "1", features = ["derive"] }
serde_json = "1"
tokio      = { version = "1", features = ["full"] }
reqwest = { default-features = false, version = "0.12", features = ["json", "rustls-tls"]  }
sha3       = "0.10"
anyhow     = "1"

[dev-dependencies]
rand       = "0.8"