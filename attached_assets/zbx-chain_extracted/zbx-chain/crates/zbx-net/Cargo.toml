[package]
name    = "zbx-net"
version = "0.1.0"
edition = "2021"
description = "Zebvix Chain P2P networking -- discv5, RLPx, GossipSub, NAT"

[dependencies]
tokio     = { version = "1", features = ["full"] }
futures   = "0.3"
secp256k1 = { version = "0.28", features = ["rand"] }
getrandom = { version = "0.2" }
snap      = "1"
enr       = "0.9"
discv5    = "0.4"
libp2p    = { version = "0.53", features = ["gossipsub", "noise", "tcp", "yamux", "identify"] }
rlp       = "0.5"
serde     = { version = "1", features = ["derive"] }
igd       = "0.11"
tracing   = "0.1"
zbx-types  = { path = "../zbx-types" }
zbx-crypto = { path = "../zbx-crypto" }