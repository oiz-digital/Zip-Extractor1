[package]
name        = "zbx-rest"
version     = "0.1.0"
edition     = "2021"
description = "Zebvix Chain REST API — OpenAPI 3.1 compliant HTTP endpoints with Swagger UI."
license     = "Apache-2.0"

[dependencies]
zbx-types      = { path = "../zbx-types" }
zbx-primitives = { path = "../zbx-primitives" }
zbx-rpc        = { path = "../zbx-rpc" }
axum           = { version = "0.7", features = ["macros"] }
tokio          = { version = "1", features = ["full"] }
serde          = { version = "1", features = ["derive"] }
serde_json     = "1"
thiserror      = "1"
tracing        = "0.1"
utoipa         = { version = "4", features = ["axum_extras"] }
utoipa-swagger-ui = { version = "6", features = ["axum"] }
hex            = "0.4"

[dev-dependencies]
axum-test = "14"
tokio     = { version = "1", features = ["full"] }
