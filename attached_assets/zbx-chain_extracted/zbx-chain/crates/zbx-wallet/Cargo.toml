[package]
name = "zbx-wallet"
version = "0.1.0"
edition = "2021"

[dependencies]
zbx-types      = { path = "../zbx-types" }
zbx-primitives = { path = "../zbx-primitives" }
zbx-crypto     = { path = "../zbx-crypto" }
zbx-pq         = { path = "../zbx-pq" }
zbx-keystore   = { path = "../zbx-keystore" }

serde          = { version = "1", features = ["derive"] }
serde_json     = { workspace = true }
thiserror      = { workspace = true }
sha3           = "0.10"
sha2           = { workspace = true }
hmac           = "0.12"
pbkdf2         = "0.12"
# k256: workspace provides "ecdsa"; we add "arithmetic" for BIP-32 scalar math
k256           = { workspace = true, features = ["arithmetic"] }
rand           = { workspace = true }
zeroize        = { workspace = true }
hex            = "0.4"
getrandom      = "0.2"
bip39          = "1"
scrypt         = { version = "0.11", default-features = false, features = ["std"] }
aes            = "0.8"
ctr            = "0.9"
uuid           = { version = "1", features = ["v4"] }
unicode-normalization = "0.1"
subtle         = "2.5"
