[package]
name = "zbx-pool"
version = "0.1.0"
edition = "2021"
description = "AMM liquidity pool and swap engine for Zebvix Chain."

[dependencies]
zbx-types    = { path = "../zbx-types" }
zbx-evm      = { path = "../zbx-evm" }
zbx-oracle   = { path = "../zbx-oracle" }
serde        = { version = "1", features = ["derive"] }
anyhow       = "1"
sha3         = "0.10"