[package]
name    = "zbx-vm"
version = "0.1.0"
edition = "2021"
authors = ["Zebvix Technologies <dev@zebvix.com>"]
description = "Zebvix EVM: full Ethereum Virtual Machine implementation"
license     = "Apache-2.0"

[dependencies]
zbx-types  = { path = "../zbx-types" }
zbx-crypto = { path = "../zbx-crypto" }
zbx-rlp    = { path = "../zbx-rlp" }
thiserror  = "1"
smallvec   = "1"
bitvec     = "1"
hex        = "0.4"
tracing    = "0.1"
serde      = { version = "1", features = ["derive"] }
primitive-types = "0.12"
sha2       = "0.10"
sha3       = "0.10"
ripemd     = "0.1"
num-bigint = "0.4"
num-traits = "0.2"
substrate-bn = "0.6"

[dev-dependencies]
proptest = "1"
criterion = "0.5"
serde_json = "1"

