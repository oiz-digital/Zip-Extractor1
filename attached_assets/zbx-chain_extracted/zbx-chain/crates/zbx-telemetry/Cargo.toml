[package]
name    = "zbx-telemetry"
version = "0.1.0"
edition = "2021"
authors = ["Zebvix Technologies <dev@zebvix.com>"]
description = "OpenTelemetry + Prometheus instrumentation for Zebvix Chain"
license     = "Apache-2.0"

[dependencies]
opentelemetry       = { version = "0.22", features = ["trace", "metrics"] }
opentelemetry_sdk   = { version = "0.22", features = ["trace", "metrics", "rt-tokio"] }
opentelemetry-otlp  = { version = "0.15", features = ["tonic", "grpc-tonic"] }
opentelemetry-prometheus = "0.15"
prometheus          = { version = "0.13", features = ["process"] }
tracing             = "0.1"
tracing-subscriber  = { version = "0.3", features = ["env-filter", "json"] }
tracing-opentelemetry = "0.23"
tokio               = { version = "1", features = ["full"] }
axum                = "0.7"
serde               = { version = "1", features = ["derive"] }
once_cell           = "1"
thiserror           = "1"
anyhow              = "1"