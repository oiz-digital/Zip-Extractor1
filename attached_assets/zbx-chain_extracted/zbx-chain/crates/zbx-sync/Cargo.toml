[package]
name = "zbx-sync"
version = "0.1.0"
edition = "2021"
description = "State synchronisation (fast-sync, snap-sync, live sync) for Zebvix Chain"

[dependencies]
zbx-types    = { path = "../zbx-types" }
zbx-crypto   = { path = "../zbx-crypto" }
zbx-storage  = { path = "../zbx-storage" }
zbx-state    = { path = "../zbx-state" }
zbx-trie     = { path = "../zbx-trie" }
zbx-network  = { path = "../zbx-network" }
zbx-consensus = { path = "../zbx-consensus" }
zbx-threshold = { path = "../zbx-threshold" }
thiserror    = "1"
tokio        = { version = "1", features = ["full"] }
tracing      = "0.1"
bytes        = "1"
futures      = "0.3"
async-trait  = "0.1"
parking_lot  = "0.12"