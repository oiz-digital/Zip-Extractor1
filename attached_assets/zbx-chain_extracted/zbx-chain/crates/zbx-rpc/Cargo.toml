[package]
name = "zbx-rpc"
version = "0.2.0"
edition = "2021"
authors = ["Zebvix Technologies Pvt Ltd"]
description = "JSON-RPC server for Zebvix — Ethereum-compatible eth_* + native zbx_* namespace"
license = "MIT"

[dependencies]
zbx-types   = { path = "../zbx-types" }
zbx-crypto  = { path = "../zbx-crypto" }
zbx-storage = { path = "../zbx-storage" }
zbx-mempool = { path = "../zbx-mempool" }
# EIP-1559: real eth_feeHistory and eth_maxPriorityFeePerGas computation.
zbx-fee     = { path = "../zbx-fee" }
zbx-rlp     = { path = "../zbx-rlp" }
zbx-xcl     = { path = "../zbx-xcl" }
zbx-staking = { path = "../zbx-staking" }
zbx-evm     = { path = "../zbx-evm" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "1"
tokio = { version = "1", features = ["net", "sync", "rt-multi-thread", "macros", "io-util", "time"] }
tokio-tungstenite = "0.21"
futures-util = { version = "0.3", features = ["sink"] }
tracing = "0.1"
hex = "0.4"
parking_lot = "0.12"
sha3 = "0.10"
sha2 = "0.10"
