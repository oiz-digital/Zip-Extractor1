[package]
name = "zbx-payid"
version = "0.1.0"
edition = "2021"
description = "Zebvix Chain — UPI-style Pay ID resolver (ali@zbx → 0x742d...)"

[dependencies]
zbx-types   = { path = "../zbx-types" }
zbx-rpc     = { path = "../zbx-rpc" }
serde       = { version = "1", features = ["derive"] }
serde_json  = "1"
thiserror   = "1"
tracing     = "0.1"
tokio       = { version = "1", features = ["full"] }
reqwest = { default-features = false, version = "0.11", features = ["json", "rustls-tls"]  }