[package]
name = "zbx-snapshot"
version = "0.1.0"
edition = "2021"

[dependencies]
zbx-primitives = { path = "../zbx-primitives" }
serde      = { version = "1", features = ["derive"] }
serde_json = "1"
bincode    = "1"
tracing    = "0.1"
sha3       = "0.10"
thiserror  = "1"
lz4_flex   = "0.11"   # real LZ4 compression for snapshot chunks