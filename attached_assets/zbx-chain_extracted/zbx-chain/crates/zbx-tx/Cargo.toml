[package]
name        = "zbx-tx"
version     = "0.1.0"
edition     = "2021"
description = "Zebvix Chain transaction types and validation"

[dependencies]
zbx-types   = { path = "../zbx-types" }
zbx-crypto  = { path = "../zbx-crypto" }
serde       = { version = "1", features = ["derive"] }
serde_json  = "1"
sha2        = "0.10"
k256        = { version = "0.13", features = ["ecdsa"] }
sha3        = "0.10"
thiserror   = "1"
hex         = "0.4"