[profile.default]
src             = "."
out             = "out"
libs            = ["lib"]
test            = "test"
cache_path      = "cache"
solc_version    = "0.8.24"
optimizer       = true
optimizer_runs  = 200
via_ir          = false         # set true for complex contracts

# Fuzz settings
[profile.default.fuzz]
runs            = 1000          # fuzz runs per test
max_test_rejects = 65536

# Invariant test settings
[profile.default.invariant]
runs            = 256
depth           = 128

# Coverage settings
[profile.coverage]
optimizer       = false         # disable for accurate coverage

# CI settings (fast)
[profile.ci]
fuzz.runs       = 100
invariant.runs  = 64

# Named addresses
[profile.default.named_addresses]
zbx_entry_point = "0x0000000000000000000000000000000000000001"
zbx_oracle      = "0x0000000000000000000000000000000000000002"
zbx_verifier    = "0x0000000000000000000000000000000000000003"

[rpc_endpoints]
zbx_devnet  = "http://localhost:8545"
zbx_testnet = "\${ZBX_TESTNET_RPC}"
zbx_mainnet = "\${ZBX_MAINNET_RPC}"

[etherscan]
zbx_mainnet = { key = "\${ZBXSCAN_API_KEY}", url = "https://explorer.zbvix.com/api" }