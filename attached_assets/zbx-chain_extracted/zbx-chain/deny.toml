# Cargo deny configuration for Zebvix Chain
# https://embarkstudios.github.io/cargo-deny/

[graph]
all-features = false

[advisories]
version = 2
ignore = []

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "CC0-1.0",
    "Unlicense",
    "0BSD",
    "Zlib",
]
deny = ["GPL-2.0", "GPL-3.0", "AGPL-3.0"]

[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[bans]
multiple-versions = "warn"
wildcards = "deny"
deny = [
    # Disallow unmaintained crates with security history.
    { name = "time", version = "=0.1" },
    { name = "net2" },
    { name = "tempdir" },
]

[sources]
unknown-registry = "deny"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]