kind = "web"
previewPath = "/"
title = "ZBX Chain Explorer"
version = "1.0.0"
id = "artifacts/zbx-explorer"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20600

[services.development]
run = "pnpm --filter @workspace/zbx-explorer run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/zbx-explorer", "run", "build" ]
publicDir = "artifacts/zbx-explorer/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20600"
BASE_PATH = "/"
